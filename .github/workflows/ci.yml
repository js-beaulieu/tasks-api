name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      any-go: ${{ steps.detect.outputs.any-go }}
      any-bazel: ${{ steps.detect.outputs.any-bazel }}
      shared: ${{ steps.detect.outputs.shared }}
      libs: ${{ steps.detect.outputs.libs }}
      apps: ${{ steps.detect.outputs.apps }}
      docker: ${{ steps.detect.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        run: |
          changed=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$changed"

          any_go=false
          any_bazel=false
          shared=false
          libs=false
          apps=false
          docker=false

          for f in $changed; do
            case "$f" in
              *.go|go.mod|go.sum|go.work|go.work.sum)
                any_go=true
                ;;
            esac
            case "$f" in
              libs/*|go.work|go.work.sum|go.mod|go.sum|Taskfile.yml|.golangci.yml|.github/*|.bazelrc|MODULE.bazel|MODULE.bazel.lock|WORKSPACE.bazel|BUILD.bazel|*/BUILD.bazel)
                shared=true
                ;;
            esac
            case "$f" in
              libs/*)
                libs=true
                ;;
            esac
            case "$f" in
              api/*)
                apps=true
                ;;
            esac
            case "$f" in
              *.go|*.mod|*.sum|*.work|*.bazel|*.bazelrc|MODULE.bazel|MODULE.bazel.lock|WORKSPACE.bazel)
                any_bazel=true
                ;;
            esac
            case "$f" in
              api/tasks/Dockerfile|.dockerignore)
                docker=true
                ;;
            esac
          done

          echo "any-go=$any_go" >> "$GITHUB_OUTPUT"
          echo "any-bazel=$any_bazel" >> "$GITHUB_OUTPUT"
          echo "shared=$shared" >> "$GITHUB_OUTPUT"
          echo "libs=$libs" >> "$GITHUB_OUTPUT"
          echo "apps=$apps" >> "$GITHUB_OUTPUT"
          echo "docker=$docker" >> "$GITHUB_OUTPUT"

  ci:
    needs: changes
    if: github.event.pull_request.draft == false && needs.changes.outputs.any-go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/tasks/go.mod
          cache: false

      - uses: actions/cache@v4
        name: Cache Go modules and build cache
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/.cache/bazel-disk-cache
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum', 'go.work.sum', 'MODULE.bazel.lock') }}
          restore-keys: go-${{ runner.os }}-

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.x"

      - name: Lint
        run: task lint

      - name: Build
        run: task build

      - name: Tests with coverage
        # Run the full test suite when any Go code, shared tooling, or workspace file changes,
        # because library changes must exercise downstream apps.
        if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.libs == 'true' || needs.changes.outputs.apps == 'true'
        run: task test:coverage:integration

      - name: Bazel build
        # Run Bazel build/test only when Bazel-relevant files change.
        if: needs.changes.outputs.any-bazel == 'true' || needs.changes.outputs.any-go == 'true'
        run: task bazel:build

      - name: Bazel test
        if: needs.changes.outputs.any-bazel == 'true' || needs.changes.outputs.any-go == 'true'
        run: task bazel:test
