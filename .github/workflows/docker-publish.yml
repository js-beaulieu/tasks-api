name: Docker Publish

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'libs/**'
      - 'go.work'
      - 'go.work.sum'
      - 'Taskfile.yml'
      - '.github/workflows/docker-publish.yml'
      - '**/Dockerfile'
      - '.dockerignore'

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/tasks/Dockerfile
          push: true
          tags: ghcr.io/js-beaulieu/hs-api-tasks:latest

      - name: Trigger Watchtower update
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_API_TOKEN }}" \
            https://watchtower.${{ secrets.DOMAIN }}/v1/update
