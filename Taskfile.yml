version: '3'

tasks:
  build:
    desc: Build all packages
    cmds:
      - go build ./...

  check:
    desc: format + lint + build + test (pre-commit sanity check)
    deps:
      - format
      - lint
      - build
      - test:coverage

  install:
    desc: Install Go tooling and Git hooks
    cmds:
      - go mod download
      - go tool lefthook install

  dev:
    desc: Start the server in development (hot-reload via air)
    cmds:
      - go tool air

  docker:build:
    desc: Build the Docker image
    vars:
      TAG: '{{default "tasks:latest" .TAG}}'
    cmds:
      - docker build -t {{.TAG}} .

  docker:run:
    desc: Run the Docker image (--rm, port 8080)
    vars:
      TAG: '{{default "tasks:latest" .TAG}}'
      PG_CONNECTION_STRING: '{{default "postgres://postgres:postgres@host.docker.internal:5432/tasks_api?sslmode=disable" .PG_CONNECTION_STRING}}'
    cmds:
      - docker run --rm --add-host=host.docker.internal:host-gateway -e PG_CONNECTION_STRING={{.PG_CONNECTION_STRING}} -p 8080:8080 {{.TAG}}

  compose:up:
    desc: Start local Postgres for development
    cmds:
      - docker compose up -d db

  compose:down:
    desc: Stop local Postgres
    cmds:
      - docker compose down

  format:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint (pinned in go.mod, no install needed)
    cmds:
      - go tool golangci-lint run

  test:
    desc: Run all tests (unit + integration)
    cmds:
      - go tool gotestsum --junitfile report.xml -- -tags integration ./...

  test:coverage:
    desc: Run full test suite (unit + integration) with coverage profile
    cmds:
      - task: test:coverage:integration

  test:coverage:check:
    desc: Check coverage.out against a threshold (default 75). Override with THRESHOLD=N.
    vars:
      THRESHOLD: '{{default "75" .THRESHOLD}}'
    cmds:
      - go run ./scripts/mincov {{.THRESHOLD}}

  test:coverage:integration:
    desc: Run integration tests (Postgres via Testcontainers) with JUnit XML report and coverage profile
    vars:
      EXCLUDE:
        - internal/testing
        - internal/model
        - .
        - scripts
      PKGS:
        sh: go run ./scripts/pkgs {{join " " .EXCLUDE}}
    cmds:
      - go tool gotestsum --junitfile report.xml -- -tags integration -cover -coverprofile=coverage.out {{.PKGS}}
      - go run ./scripts/mincov 75

  test:coverage:unit:
    desc: Run unit tests with JUnit XML report and coverage profile
    vars:
      EXCLUDE:
        - internal/testing
        - internal/model
        - internal/store/postgres
        - .
        - scripts
      PKGS:
        sh: go run ./scripts/pkgs {{join " " .EXCLUDE}}
    cmds:
      - go tool gotestsum --junitfile report.xml -- -cover -coverprofile=coverage.out {{.PKGS}}
      - go run ./scripts/mincov 75

  test:integration:
    desc: Run integration tests only (spins up Postgres with Testcontainers)
    cmds:
      - go tool gotestsum --junitfile report.xml -- -tags integration ./...

  test:unit:
    desc: Run unit tests only (no DB)
    cmds:
      - go tool gotestsum --junitfile report.xml -- ./...

  test:watch:
    desc: Run all tests once then watch for changes
    cmds:
      - go tool gotestsum -- -tags integration ./...
      - go tool gotestsum --watch -- -tags integration ./...

  test:watch:integration:
    desc: Run integration tests once then watch for changes
    cmds:
      - go tool gotestsum -- -tags integration ./...
      - go tool gotestsum --watch -- -tags integration ./...

  test:watch:unit:
    desc: Run unit tests once then watch for changes
    cmds:
      - go tool gotestsum -- ./...
      - go tool gotestsum --watch -- ./...
