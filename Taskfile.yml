version: '3'

tasks:
  build:
    desc: Build all packages
    cmds:
      - go build ./...

  test:
    desc: Run all tests (unit + integration)
    cmds:
      - go tool gotestsum --junitfile report.xml -- -tags integration ./...

  test:unit:
    desc: Run unit tests only (no DB)
    cmds:
      - go tool gotestsum --junitfile report.xml -- ./...

  test:integration:
    desc: Run integration tests only (requires SQLite)
    cmds:
      - go tool gotestsum --junitfile report.xml -- -tags integration ./...

  test:unit:coverage:
    desc: Run unit tests with JUnit XML report and coverage profile
    cmds:
      - go tool gotestsum --junitfile report.xml -- -coverprofile=coverage.out ./...

  test:unit:watch:
    desc: Run unit tests once then watch for changes
    cmds:
      - go tool gotestsum -- ./...
      - go tool gotestsum --watch -- ./...

  test:integration:watch:
    desc: Run integration tests once then watch for changes
    cmds:
      - go tool gotestsum -- -tags integration ./...
      - go tool gotestsum --watch -- -tags integration ./...

  test:watch:
    desc: Run all tests once then watch for changes
    cmds:
      - go tool gotestsum -- -tags integration ./...
      - go tool gotestsum --watch -- -tags integration ./...

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint (pinned in go.mod, no install needed)
    cmds:
      - go tool golangci-lint run

  dev:
    desc: Start the server in development (hot-reload via air)
    cmds:
      - go tool air

  check:
    desc: fmt + lint + build + test (pre-commit sanity check)
    cmds:
      - task: fmt
      - task: lint
      - task: build
      - task: test:unit
