version: '3'

vars:
  APPS_DIR: api
  LIBS_DIR: libs
  # The canonical module that pins our Go tools (golangci-lint, gotestsum, lefthook, air).
  TOOLS_MODULE: api/tasks

  # Discover all Go modules under api/* and libs/* as space-separated relative paths.
  APP_MODULES:
    sh: find {{.APPS_DIR}} -maxdepth 2 -name go.mod -printf '%h ' | xargs
  LIB_MODULES:
    sh: find {{.LIBS_DIR}} -maxdepth 2 -name go.mod -printf '%h ' | xargs

  # Absolute path to the tools module so lib lint can invoke `go tool -C <tools>`.
  TOOLS_MODULE_ABS:
    sh: realpath {{.TOOLS_MODULE}}

env:
  # Ensure tools in the main app module are found by `go tool` when running from the repo root.
  GOTOOLCHAIN: local

tasks:
  build:
    desc: Build all workspace packages
    cmds:
      - for:
          var: APP_MODULES
        cmd: cd {{.ITEM}} && go build ./...
      - for:
          var: LIB_MODULES
        cmd: cd {{.ITEM}} && go build ./...

  check:
    desc: format + lint + build + test (pre-commit sanity check)
    deps:
      - format
      - lint
      - build
      - test:coverage

  install:
    desc: Install Go tooling and Git hooks
    dir: api/tasks
    cmds:
      - go mod download
      - go tool lefthook install

  dev:
    desc: Start the tasks API server in development (hot-reload via air)
    dir: api/tasks
    cmds:
      - go tool air

  docker:build:
    desc: Build the tasks API Docker image from the repo root context
    vars:
      TAG: '{{default "hs-api-tasks:latest" .TAG}}'
    cmds:
      - docker build -t {{.TAG}} -f api/tasks/Dockerfile .

  docker:run:
    desc: Run the tasks API Docker image (--rm, port 8080)
    vars:
      TAG: '{{default "hs-api-tasks:latest" .TAG}}'
      PG_CONNECTION_STRING: '{{default "postgres://postgres:postgres@host.docker.internal:5432/tasks_api?sslmode=disable" .PG_CONNECTION_STRING}}'
    cmds:
      - docker run --rm --add-host=host.docker.internal:host-gateway -e PG_CONNECTION_STRING={{.PG_CONNECTION_STRING}} -p 8080:8080 {{.TAG}}

  compose:up:
    desc: Start local Postgres for development
    dir: api/tasks
    cmds:
      - docker compose up -d db

  compose:down:
    desc: Stop local Postgres
    dir: api/tasks
    cmds:
      - docker compose down

  format:
    desc: Format all Go source files
    cmds:
      - gofmt -w .
      - go tool -C {{.TOOLS_MODULE}} golangci-lint fmt

  lint:
    desc: Run golangci-lint (pinned in api/tasks/go.mod, no install needed)
    cmds:
      - task: lint:libs
      - task: lint:apps

  lint:apps:
    desc: Lint app modules
    cmds:
      - for:
          var: APP_MODULES
        cmd: cd {{.ITEM}} && go tool -C {{.TOOLS_MODULE_ABS}} golangci-lint run

  lint:libs:
    desc: Lint library modules
    cmds:
      - for:
          var: LIB_MODULES
        cmd: cd {{.ITEM}} && go tool -C {{.TOOLS_MODULE_ABS}} golangci-lint run

  test:
    desc: Run all tests (unit + integration)
    cmds:
      - task: test:libs
      - task: test:apps

  test:coverage:
    desc: Run full test suite (unit + integration) with coverage profile
    cmds:
      - task: test:coverage:integration

  test:coverage:check:
    desc: Check coverage.out against a threshold (default 75). Override with THRESHOLD=N.
    dir: api/tasks
    vars:
      THRESHOLD: '{{default "75" .THRESHOLD}}'
    cmds:
      - go run ./scripts/mincov {{.THRESHOLD}}

  test:coverage:integration:
    desc: Run integration tests (Postgres via Testcontainers) with JUnit XML report and coverage profile
    dir: api/tasks
    vars:
      EXCLUDE:
        - internal/testing
        - internal/model
        - .
        - scripts
      PKGS:
        sh: go run ./scripts/pkgs {{join " " .EXCLUDE}}
    cmds:
      - go tool gotestsum --junitfile report.xml -- -tags integration -cover -coverprofile=coverage.out {{.PKGS}}
      - go run ./scripts/mincov 75

  test:coverage:unit:
    desc: Run unit tests with JUnit XML report and coverage profile
    dir: api/tasks
    vars:
      EXCLUDE:
        - internal/testing
        - internal/model
        - internal/store/postgres
        - .
        - scripts
      PKGS:
        sh: go run ./scripts/pkgs {{join " " .EXCLUDE}}
    cmds:
      - go tool gotestsum --junitfile report.xml -- -cover -coverprofile=coverage.out {{.PKGS}}
      - go run ./scripts/mincov 75

  test:integration:
    desc: Run integration tests only (spins up Postgres with Testcontainers)
    cmds:
      - task: test:apps:integration

  test:apps:
    desc: Run all app module tests
    cmds:
      - task: test:apps:integration

  test:apps:integration:
    desc: Run app integration tests
    dir: api/tasks
    cmds:
      - go tool gotestsum --junitfile report.xml -- -tags integration ./...

  test:libs:
    desc: Run library module tests
    cmds:
      - for:
          var: LIB_MODULES
        cmd: cd {{.ITEM}} && go test ./...

  test:unit:
    desc: Run unit tests only (no DB)
    dir: api/tasks
    cmds:
      - go tool gotestsum --junitfile report.xml -- ./...

  test:watch:
    desc: Run all tests once then watch for changes
    dir: api/tasks
    cmds:
      - go tool gotestsum -- -tags integration ./...
      - go tool gotestsum --watch -- -tags integration ./...

  test:watch:integration:
    desc: Run integration tests once then watch for changes
    dir: api/tasks
    cmds:
      - go tool gotestsum -- -tags integration ./...
      - go tool gotestsum --watch -- -tags integration ./...

  test:watch:unit:
    desc: Run unit tests once then watch for changes
    dir: api/tasks
    cmds:
      - go tool gotestsum -- ./...
      - go tool gotestsum --watch -- ./...

  # ────────────────────────────────────────────────────────────────────────────
  # Bazel integration (via tools/go.mod; no global Bazelisk required)
  # Generic targets operate on all packages under api/* and libs/*.
  # ────────────────────────────────────────────────────────────────────────────

  bazel:
    desc: Run Bazelisk through the pinned tools module (passes args to bazel)
    vars:
      ARGS: '{{.CLI_ARGS}}'
      BAZEL_VERSION:
        sh: cat .bazelversion | tr -d '\n'
    env:
      USE_BAZEL_VERSION: '{{.BAZEL_VERSION}}'
    cmds:
      - go tool -C tools bazelisk {{.ARGS}}

  bazel:build:
    desc: Bazel build all repo targets
    cmds:
      - task: bazel
        vars:
          CLI_ARGS: build //...

  bazel:test:
    desc: Bazel test all repo targets
    cmds:
      - task: bazel
        vars:
          CLI_ARGS: test //...

  bazel:gazelle:
    desc: Run Gazelle to update Bazel build files for api/* and libs/*
    cmds:
      - task: bazel
        vars:
          CLI_ARGS: run //:gazelle -- -r api libs

  bazel:query:
    desc: Run a Bazel query through the pinned tools module
    cmds:
      - task: bazel
        vars:
          CLI_ARGS: 'query {{.CLI_ARGS}}'

  bazel:clean:
    desc: Clean Bazel output and disk cache
    cmds:
      - task: bazel
        vars:
          CLI_ARGS: clean
      - rm -rf ~/.cache/bazel-disk-cache
